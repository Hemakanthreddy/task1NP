<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 40px auto; max-width: 800px; padding: 0 20px; color: #333; }
        h1 { color: #2b8a3c; margin-bottom: 10px; font-size: 24px; }
        hr { border: 0; height: 1px; background: #ccc; margin-bottom: 20px; }
        :root {
  /* Light Theme Colors */
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --text-primary: #212529;
  --text-secondary: #495057;
  --accent-color: #2b8a3e; /* Compassionate green for NGOs */
  --accent-hover: #237032;
  --button-text: #ffffff;
  --border-color: #dee2e6;
  
  /* Layout Constants */
  --max-width: 1100px;
  --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* This class applies when dark mode is toggled via JavaScript */
[data-theme="dark"] {
  --bg-primary: #121212;
  --bg-secondary: #1e1e1e;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --accent-color: #40c057;
  --accent-hover: #51cf66;
  --button-text: #121212;
  --border-color: #333333;
}
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            gap: 20px;
        }
        nav ul li a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: bold;
        }
        nav ul li a:hover {
            color: var(--accent-color);
        }
        #theme-toggle {
            background-color: var(--accent-color);
            color: var(--button-text);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        #theme-toggle:hover {
            background-color: var(--accent-hover);
        }
        form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        form input[type="text"],
        form input[type="email"],
        form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
        }
        form input[type="submit"] {
            background-color: var(--accent-color);
            color: var(--button-text);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        form input[type="submit"]:hover {
            background-color: var(--accent-hover);
        }
    </style>
    <div>
    
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    <button id="theme-toggle" aria-label="Toggle dark mode">Switch Theme</button>
    <script>
  const toggleBtn = document.getElementById('theme-toggle');
  toggleBtn.addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
  });
</script>

    </nav>
    <h1>Contact Us</h1>
    <p>If you have any questions or would like to get in touch with us, please fill out the form below:</p>
    <form action="submit_form.php" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="40" required></textarea><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
